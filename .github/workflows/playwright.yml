name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        node-version: [18, 20]
        browser: [chromium, firefox, webkit]

    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL || 'admin@example.com' }}
      ADMIN_PASSWORD: ${{ vars.ADMIN_PASSWORD || 'password' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for Payload CMS to be ready
        run: |
          echo "Waiting for CMS to be available..."
          sleep 10
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
              echo "CMS is ready."
              exit 0
            fi
            echo "Attempt $i/60 - not ready yet, waiting 5s..."
            sleep 5
          done
          echo "CMS did not become ready in time."
          docker compose logs payload
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --browser=${{ matrix.browser }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down
